<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guard Tour | SecOps</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0a0a0f;color:white;display:flex;justify-content:center;align-items:center;min-height:100dvh;padding:16px}
        .login-card{background:#1a1a24;border-radius:20px;padding:40px 32px;width:100%;max-width:400px;border:1px solid #3a3a3a}
        .login-card h2{text-align:center;margin-bottom:8px;font-size:24px;font-weight:700}
        .input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
        .input-group label{font-size:14px;font-weight:500;color:#c0c0c8}
        .input-group input{width:100%;padding:14px 16px;background:#14141c;border:1px solid #3a3a3a;border-radius:12px;color:white;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
        .input-group input:focus{border-color:#c62828}
        button{width:100%;padding:14px;background:#c62828;border:none;border-radius:12px;color:white;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
        button:hover{background:#b71c1c}
        button:active{transform:scale(.98)}
        .error{color:#f44336;margin-top:12px;font-size:14px;min-height:20px}
        .links{margin-top:20px;text-align:center;font-size:14px;color:#888}
        .links a{color:#ff5f52;text-decoration:none;font-weight:500}
        .links a:hover{text-decoration:underline}
        @media(max-width:480px){body{padding:12px}.login-card{padding:32px 20px;border-radius:16px}.login-card h2{font-size:22px}}
        @media(max-width:360px){.login-card{padding:24px 16px}.login-card h2{font-size:20px}}
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Guard Tour</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password">
        </div>
        <button type="button" onclick="login()">Login</button>
        <div id="errorMsg" class="error"></div>
        <div class="links">Don't have an account? <a href="/register/">Register here</a></div>
    </div>
    <script>
        function login() {
            var u = document.getElementById('username').value;
            var p = document.getElementById('password').value;
            fetch('/api/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            })
            .then(r => r.json())
            .then(d => {
                if (d.access) {
                    localStorage.setItem('gt_user', JSON.stringify({
                        token: d.access,
                        refresh: d.refresh,
                        username: (d.user && d.user.username) ? d.user.username : u,
                        role: d.role,
                        organization_id: d.organization_id ? d.organization_id[0] : null,
                        organization_name: d.organization_name
                    }));
                    window.location.href = '/dashboard/';
                } else {
                    document.getElementById('errorMsg').textContent = (d.error || d.detail || 'Login failed');
                }
            })
            .catch(e => { document.getElementById('errorMsg').textContent = 'Error'; });
        }
    </script>
</body>
</html>
