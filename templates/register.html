{% extends base_template %}
{% block extra_head %}
<style>
  :root {
    --r-crim: #d32f2f;
    --r-crim2: #ef5350;
    --r-surf: #141420;
    --r-surf3: #0d0d14;
    --r-line: rgba(255, 255, 255, 0.07);
    --r-mute: rgba(255, 255, 255, 0.38);
    --r-text: rgba(255, 255, 255, 0.92);
    --r-glow-crim: 0 0 18px rgba(211, 47, 47, 0.35);
    --r-rad: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: radial-gradient(circle at top left, #161625, #0a0a10 55%, #0d0d18 100%);
    color: var(--r-text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    padding: 16px;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    padding: 32px;
    border: 1px solid #9aa0aa;
    background: linear-gradient(160deg, rgba(26,26,38,0.9) 0%, rgba(12,12,24,0.96) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55);
  }
  .login-card h2 { text-align: center; margin-bottom: 6px; font-size: 22px; font-weight: 800; }
  .login-card .sub { text-align: center; font-size: 13px; color: var(--r-mute); margin-bottom: 22px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .input-group label { font-size: 13px; font-weight: 700; color: #b8bcc4; }
  .input-group input, .input-group select {
    width: 100%; padding: 13px 15px; background: var(--r-surf3); border: 1px solid var(--r-line);
    border-radius: var(--r-rad); color: white; font-size: 15px; font-family: inherit; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group input:focus, .input-group select:focus { border-color: var(--r-crim); box-shadow: 0 0 0 2px rgba(211,47,47,0.12); }
  button.primary-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #b71c1c, #d32f2f); border: none;
    border-radius: var(--r-rad); color: white; font-size: 15px; font-weight: 800; cursor: pointer;
    font-family: inherit; transition: filter 0.15s, transform 0.15s; box-shadow: var(--r-glow-crim); margin-top: 4px;
  }
  button.primary-btn:hover { filter: brightness(1.08); }
  button.primary-btn:active { transform: scale(0.98); }
  .error { color: var(--r-crim2); margin-top: 10px; font-size: 14px; min-height: 20px; }
  .links { margin-top: 18px; text-align: center; font-size: 14px; color: #9a9aa2; }
  .links a { color: var(--r-crim2); text-decoration: none; font-weight: 700; }
  .links a:hover { text-decoration: underline; }
  @media (max-width: 480px) { body { padding: 12px; } .login-card { padding: 24px 18px; border-radius: 16px; } .login-card h2 { font-size: 20px; } }
  @media (max-width: 360px) { .login-card { padding: 20px 14px; } .login-card h2 { font-size: 18px; } }
</style>
{% endblock %}
{% block content %}
<div class="login-card">
  <h2>System Onboarding</h2>
  <div class="sub">Create SecOps credentials</div>
  <form
    id="registerForm"
    hx-post="/api/register/"
    hx-target="#registerResult"
    hx-swap="innerHTML"
    hx-push-url="false"
    hx-include="#registerFormFields"
    hx-indicator="#registerIndicator"
  >
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" />
    </div>
    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Email Address" autocomplete="email" />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password" />
    </div>
    <div class="input-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="dispatcher" selected>Dispatcher</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button type="submit" class="primary-btn" id="registerIndicator" style="display:none;">Creating account...</button>
    <button type="submit" class="primary-btn">Create Account</button>
    <div id="registerResult">
      <div class="error"></div>
    </div>
  </form>
  <div class="links">Already have an account? <a href="/login/">Login here</a></div>
</div>
{% endblock %}
{% block page_js %}
  {% load static %}{% load vite %}
  <!-- Auth response handled in-template via HTMX; no extra module boot required. -->
{% endblock %}
