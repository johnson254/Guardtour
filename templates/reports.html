{% extends base_template %}
{% block content %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/page-reports.css' %}" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<div class="card-header" style="background: transparent; border: none; padding: 0 0 20px 0;">
    <div class="card-title" style="font-size: 1.2rem;">Tactical Audit Vault</div>
</div>

    <div class="report-layout spa-page">
        <div class="filter-panel">
            <h3>Filter Parameters</h3>
            <form id="reportFilters" hx-get="/api/scans-table-partial/" hx-target="#reportContainer" hx-include="#startDate,#endDate,#filterGuard,#filterRoute,#filterStatus">
                <label for="startDate" class="label-mini">Date Horizon</label>
                <input type="date" id="startDate" name="start_date">
                <label for="endDate" class="label-mini">End Date</label>
                <input type="date" id="endDate" name="end_date">

                <label for="filterGuard" class="label-mini">Personnel</label>
                <select id="filterGuard" name="guard_id"
                        hx-get="/api/reports-guards-options-partial/"
                        hx-trigger="load"
                        hx-swap="innerHTML"></select>

                <label for="filterRoute" class="label-mini">Operational Route</label>
                <select id="filterRoute" name="route_id"
                        hx-get="/api/reports-routes-options-partial/"
                        hx-trigger="load"
                        hx-swap="innerHTML"></select>

                <label for="filterStatus" class="label-mini">Compliance Status</label>
                <select id="filterStatus" name="is_on_time">
                    <option value="">All Scans</option>
                    <option value="true">On-Time Only</option>
                    <option value="false">Violations Only</option>
                </select>

                <button type="submit" class="action-btn">Apply Filters</button>
            </form>
            <button type="button" onclick="exportFullPDF()" class="export-btn">Export Full Audit (PDF)</button>
        </div>

        <div class="report-display">
            <div id="reportContainer" hx-get="/api/scans-table-partial/" hx-trigger="load, every 300s" hx-include="#reportFilters" hx-target="this">
                <p style="text-align: center; padding: 100px; color: var(--text-muted);">Initializing Audit Engine...</p>
            </div>
        </div>
    </div>

{% block page_js %}
  {% load static %}
  {% load vite %}
  <script type="module" src="{% vite_asset 'src/pages/reports.js' %}"></script>
{% endblock %}
{% endblock %}
