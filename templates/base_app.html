<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Guard Command | SecOps</title>
  {% block extra_head %}{% endblock %}
  {% load static %}{% load vite %}
  <link rel="stylesheet" href="{% vite_asset 'src/main.js' 'css' %}" />
  <link rel="stylesheet" href="{% static 'css/duty-cycle.css' %}" />
  <link rel="stylesheet" href="{% static 'css/manage.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <script>
    htmx.config.globalViewTransitions = true;
    htmx.config.includeIndicatorStyles = true;
    window.sessionToken = "{{ access_token|default:'' }}";
  </script>
</head>
<body class="glass-app">
  <div id="session-root" data-publicpath="/login/" data-sessionpath="/dashboard/" style="display:none;"></div>
  <div id="dashboard-telemetry-injector" style="display:none;" aria-hidden="true"></div>
  <div id="msg-telemetry-root" data-endpoint-telemetry="context" style="display:none;"></div>

  <div id="toast-container"></div>

  <header class="top-nav glass-shell" data-nav-root="organization">
    <div class="top-nav-inner">
      <div class="org-brand">
        <div class="org-avatar" id="orgAvatar">
          <i class="fas fa-building org-avatar-icon"></i>
        </div>
        <div class="org-identity">
          <div class="org-name" id="org-name">SecOps</div>
          <div class="org-detail" id="org-detail">Organization</div>
        </div>
      </div>
      <nav class="nav-links" id="navMenu" aria-label="Primary">
        <a href="/dashboard/" class="nav-pill dashboard" data-nav-action="refresh">
          <i class="fas fa-gauge-high" aria-hidden="true"></i> Dashboard / Incident
        </a>
      </nav>
      <div class="nav-actions">
        <span class="role-badge" id="role-badge" aria-live="polite"></span>
        <span class="nav-user" id="user-name" aria-live="polite"></span>
        <button type="button" id="logout-btn" class="ghost-btn" title="Sign out" aria-label="Sign out">
          <i class="fas fa-power-off" aria-hidden="true"></i> Exit
        </button>
      </div>
    </div>
  </header>

  <main id="spa-content" class="content" aria-live="polite">
    {% block content %}{% endblock %}
  </main>

  {% block page_js %}{% endblock %}
</body>
</html>
