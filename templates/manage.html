{% extends base_template %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
{% load static %}
<link rel="stylesheet" href="{% static 'css/manage.css' %}">

<!-- ── Shell ───────────────────────────────────────────── -->
<div class="mg-shell spa-page">

    <!-- Tab bar -->
    <div class="mg-tabbar">
        <button type="button" class="mg-tab active" hx-get="/api/staff-panel-partial/" hx-target="#mgPanelContainer" hx-swap="innerHTML" hx-trigger="click" data-panel="staff">
            <i class="fas fa-users"></i> Staff & Duty
            <span class="mg-tab-count" id="tcStaff">—</span>
        </button>
        <button type="button" class="mg-tab" hx-get="/api/fleet-panel-partial/" hx-target="#mgPanelContainer" hx-swap="innerHTML" hx-trigger="click" data-panel="fleet" id="tab-fleet">
            <i class="fas fa-microchip"></i> Fleet & Assets
            <span class="mg-tab-count" id="tcFleet">—</span>
        </button>
        <button type="button" class="mg-tab" hx-get="/api/audit-panel-partial/" hx-target="#mgPanelContainer" hx-swap="innerHTML" hx-trigger="click" data-panel="audit">
            <i class="fas fa-route"></i> Routes & Audit
            <span class="mg-tab-count" id="tcAudit">—</span>
        </button>
    </div>

    <!-- Panel container — htmx loads panels here -->
    <div class="mg-panel-container" id="mgPanelContainer">
        <!-- Staff panel loaded by default -->
        <div class="mg-panel active" id="mgPanelStaff">
            {% include "partials/manage/staff_panel.html" %}
        </div>
    </div>

<!-- ── Modal ─────────────────────────────────────────── -->
<div class="mg-modal-backdrop" id="mgModal">
    <div class="mg-modal">
        <div class="mg-modal-title" id="mgModalTitle">Add Entry</div>
        <div id="mgModalBody"></div>
        <div class="mg-modal-footer">
            <button type="button" class="mg-btn mg-btn-primary" style="flex:1" onclick="mgSubmit()">
                <i class="fas fa-check"></i> <span id="mgSubmitLabel">Save</span>
            </button>
            <button type="button" class="mg-btn" style="flex:1" onclick="mgCloseModal()">Cancel</button>
        </div>
    </div>
</div>

<div class="mg-toasts" id="mgToasts"></div>

<!-- Swap Operator Overlay -->
<div id="mgSwapOverlay" class="mg-hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:380px;max-width:90vw;">
        <div style="font-size:0.85rem;font-weight:700;margin-bottom:8px;color:var(--text);"><i class="fas fa-exchange-alt" style="color:#F5A623;margin-right:6px;"></i>Swap Operator</div>
        <div id="mgSwapBody"></div>
    </div>
</div>

<!-- Device Control Dropdown -->
<div id="mgDcDropdownBackdrop" onclick="mgDcClose()"></div>
<div id="mgDcDropdown">
    <div id="mgDcDropdownBody" style="width:500px;max-width:calc(100vw - 40px);max-height:min(80vh,700px);background:linear-gradient(160deg, rgba(24,24,32,0.98), rgba(16,16,24,0.99));border:1px solid rgba(255,255,255,0.08);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 64px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);overflow:hidden;">
    </div>
</div>

{% block page_js %}
  {% load static %}
  {% load vite %}
  <script>
    var _activePanel = 'staff';
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'mgPanelContainer') {
            document.querySelectorAll('.mg-tab').forEach(function(t) { t.classList.remove('active'); });
            var url = evt.detail.requestConfig?.path || '';
            var panel = url.split('-panel-partial')[0].split('/').pop();
            if (panel) {
                _activePanel = panel;
                var btn = document.querySelector('.mg-tab[data-panel="' + panel + '"]');
                if (btn) btn.classList.add('active');
            }
        }
    });
    document.body.addEventListener('click', function(evt) {
        var tab = evt.target.closest('.mg-tab');
        if (!tab) return;
        if (tab.dataset.panel === _activePanel) {
            evt.stopImmediatePropagation();
            evt.preventDefault();
            return false;
        }
    }, true);
  </script>
  <script type="module" src="{% vite_asset 'src/pages/manage.js' %}"></script>
{% endblock %}
{% endblock %}
