{% comment %}
Checkpoint Editor — editable checkpoint rows with type selector,
                   conditional fields, and sliders

  Dependencies: escHtml() function

  Usage:
    {% include "components/checkpoint_editor.html" %}
    <script>
      CheckpointEditor.init({
        container: 'cpEditorContainer',  // ID of container div
        countEl: 'cpCount',              // ID for count display
        footerEl: 'cpFooter',            // ID for footer display
        emptyText: 'No checkpoints',     // text when empty
        onChange: function(cps) { }      // called on every mutation
      });
      CheckpointEditor.render(myCheckpoints);
      CheckpointEditor.getData(); // returns current checkpoint array
    </script>
{% endcomment %}
<style>
.cpe-row {
    display:flex; flex-direction:column; gap:3px;
    padding:5px 6px; background:#1A1A2A; border:1px solid rgba(255,255,255,0.06);
    border-radius:5px; font-size:0.52rem;
}
.cpe-head { display:flex; align-items:center; gap:4px; }
.cpe-idx { color:#6C8EEF; font-weight:800; font-size:0.48rem; min-width:14px; }
.cpe-type {
    width:46px; padding:1px 2px; border-radius:3px; border:1px solid rgba(255,255,255,0.08);
    background:#0D0D14; color:#6C8EEF; font-size:0.5rem; font-weight:700; cursor:pointer;
}
.cpe-name, .cpe-tag {
    padding:1px 4px; border-radius:3px; border:1px solid rgba(255,255,255,0.06);
    background:#0D0D14; color:#fff; font-size:0.52rem;
}
.cpe-name { flex:1; min-width:40px; }
.cpe-tag { width:50px; }
.cpe-del {
    background:transparent; border:none; color:rgba(211,47,47,0.5); cursor:pointer;
    font-size:0.6rem; padding:1px 3px; border-radius:3px; flex-shrink:0;
}
.cpe-del:hover { color:#d32f2f; background:rgba(211,47,47,0.1); }
.cpe-fields { display:flex; gap:3px; flex-wrap:wrap; align-items:center; }
.cpe-fields input, .cpe-fields select {
    padding:1px 3px; border-radius:3px; border:1px solid rgba(255,255,255,0.06);
    background:#0D0D14; color:#fff; font-size:0.5rem; min-width:0;
}
.cpe-fields input:focus { outline:none; border-color:rgba(108,142,239,0.4); }
.cpe-time { width:46px; }
.cpe-lat, .cpe-lng { width:55px; }
.cpe-fl { font-size:0.45rem; color:rgba(255,255,255,0.3); margin-right:1px; }
.cpe-sliders { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.cpe-sliders label { display:flex; align-items:center; gap:2px; font-size:0.45rem; color:rgba(255,255,255,0.4); }
.cpe-sliders input[type=range] {
    width:40px; height:3px; -webkit-appearance:none; appearance:none;
    background:rgba(255,255,255,0.08); border-radius:2px; border:none; padding:0; margin:0;
}
.cpe-sliders input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:7px; height:7px; border-radius:50%;
    background:#6C8EEF; cursor:pointer;
}
.cpe-sv { color:rgba(255,255,255,0.6); font-size:0.48rem; min-width:18px; text-align:right; }
</style>

<script>
(function() {
    if (window.CheckpointEditor) return;

    var editorConfig = {
        container: 'cpeContainer',
        countEl: null,
        footerEl: null,
        emptyText: 'No checkpoints',
        onChange: null
    };

    var internalCps = [];

    function escHtml(s) {
        if (typeof s !== 'string') return s || '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function $(id) { return document.getElementById(id); }

    var TYPE_OPTS = [
        {v:'nfc',l:'NFC'},{v:'gps',l:'GPS'},{v:'geo',l:'GEO'},{v:'peer',l:'Peer'}
    ].map(function(o) { return '<option value="' + o.v + '">' + o.l + '</option>'; }).join('');

    function render() {
        var container = $(editorConfig.container);
        if (!container) return;

        if (editorConfig.countEl) {
            var count = $(editorConfig.countEl);
            if (count) count.textContent = internalCps.length ? '(' + internalCps.length + ')' : '(0)';
        }
        if (editorConfig.footerEl) {
            var footer = $(editorConfig.footerEl);
            if (footer) footer.innerHTML = internalCps.length
                ? '<span><i class="fas fa-route"></i> ' + internalCps.length + ' checkpoints</span>'
                : '';
        }

        if (!internalCps.length) {
            container.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.2);font-size:0.75rem;">' + editorConfig.emptyText + '</div>';
            return;
        }

        container.innerHTML = internalCps.map(function(cp, i) {
            var planned = cp.planned_time ? cp.planned_time.substring(0,5) : '';
            var dwell = cp.dwell_time ?? 0;
            var tol = cp.time_tolerance ?? 15;
            var rad = cp.radius ?? 50;
            var lat = cp.lat ?? '';
            var lng = cp.lng ?? '';
            var nfcTag = cp.nfc_tag ?? '';
            var cpType = cp.checkpoint_type || 'gps';
            var showNfc = cpType === 'nfc';
            var showLatLng = cpType === 'gps' || cpType === 'geo';
            var showRadius = cpType === 'gps' || cpType === 'geo';
            var selHtml = TYPE_OPTS.replace('value="' + cpType + '"', 'value="' + cpType + '" selected');
            return '<div class="cpe-row" data-idx="' + i + '">' +
                '<div class="cpe-head">' +
                    '<span class="cpe-idx">#' + (i+1) + '</span>' +
                    '<select class="cpe-type" onchange="window.CPE_UPDATE(' + i + ',\'checkpoint_type\',this.value);window.CPE_RENDER()">' + selHtml + '</select>' +
                    '<input class="cpe-name" value="' + escHtml(cp.name || '') + '" placeholder="Name" onchange="window.CPE_UPDATE(' + i + ',\'name\',this.value)">' +
                    (showNfc ? '<input class="cpe-tag" value="' + escHtml(nfcTag) + '" placeholder="NFC UID" onchange="window.CPE_UPDATE(' + i + ',\'nfc_tag\',this.value)">' : '') +
                    '<button class="cpe-del" onclick="window.CPE_REMOVE(' + i + ')" title="Remove"><i class="fas fa-xmark"></i></button>' +
                '</div>' +
                '<div class="cpe-fields">' +
                    '<input class="cpe-time" type="time" value="' + planned + '" onchange="window.CPE_UPDATE(' + i + ',\'planned_time\',this.value)">' +
                    (showLatLng ? '<span class="cpe-fl">Lat</span><input class="cpe-lat" value="' + lat + '" placeholder="0.0000" onchange="window.CPE_UPDATE(' + i + ',\'lat\',this.value?parseFloat(this.value):null)"><span class="cpe-fl">Lng</span><input class="cpe-lng" value="' + lng + '" placeholder="0.0000" onchange="window.CPE_UPDATE(' + i + ',\'lng\',this.value?parseFloat(this.value):null)">' : '') +

                '</div>' +
                '<div class="cpe-sliders">' +
                    (showRadius ? '<label>R <input type="range" min="5" max="500" step="5" value="' + rad + '" oninput="window.CPE_UPDATE(' + i + ',\'radius\',Number(this.value));this.nextElementSibling.textContent=this.value+\'m\'"><span class="cpe-sv">' + rad + 'm</span></label>' : '') +
                    '<label>Dw <input type="range" min="0" max="60" step="1" value="' + dwell + '" oninput="window.CPE_UPDATE(' + i + ',\'dwell_time\',Number(this.value));this.nextElementSibling.textContent=this.value+\'m\'"><span class="cpe-sv">' + dwell + 'm</span></label>' +
                    '<label>Tol <input type="range" min="0" max="60" step="1" value="' + tol + '" oninput="window.CPE_UPDATE(' + i + ',\'time_tolerance\',Number(this.value));this.nextElementSibling.textContent=this.value+\'m\'"><span class="cpe-sv">' + tol + 'm</span></label>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    window.CPE_RENDER = function() {
        render();
        if (editorConfig.onChange) editorConfig.onChange(internalCps);
    };

    window.CPE_UPDATE = function(idx, field, val) {
        if (!internalCps[idx]) return;
        if (field === 'planned_time' && val) val += ':00';
        internalCps[idx][field] = val;
        if (editorConfig.onChange) editorConfig.onChange(internalCps);
    };

    window.CPE_REMOVE = function(idx) {
        internalCps.splice(idx, 1);
        render();
        if (editorConfig.onChange) editorConfig.onChange(internalCps);
    };

    window.CheckpointEditor = {
        init: function(config) {
            if (config) {
                if (config.container) editorConfig.container = config.container;
                if (config.countEl) editorConfig.countEl = config.countEl;
                if (config.footerEl) editorConfig.footerEl = config.footerEl;
                if (config.emptyText) editorConfig.emptyText = config.emptyText;
                if (config.onChange) editorConfig.onChange = config.onChange;
            }
        },
        render: function(cps) {
            internalCps = cps || [];
            render();
            if (editorConfig.onChange) editorConfig.onChange(internalCps);
        },
        getData: function() {
            return internalCps;
        },
        setData: function(cps) {
            internalCps = cps || [];
            render();
            if (editorConfig.onChange) editorConfig.onChange(internalCps);
        }
    };
})();
</script>
