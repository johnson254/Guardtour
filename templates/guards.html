{% extends base_template %}
{% load htmx_base %}{% block content %}
<style>
    .personnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .person-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; transition: var(--transition); position: relative; overflow: hidden; }
    .person-card:hover { border-color: var(--primary); transform: translateY(-4px); }
    .person-card .status-pill { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
</style>
<div class="card-header" style="background: transparent; border: none; padding: 0 0 20px 0;">
    <div class="card-title" style="font-size: 1.2rem;">Personnel Directory</div>
    <button class="new-template-btn"
            hx-get="/api/guard-form-partial/new/"
            hx-target="#guardFormFields"
            hx-swap="innerHTML"
            onclick="document.getElementById('guardForm').style.display='block';document.getElementById('guardFormTitle').innerText='Add Guard';document.querySelector('input[name=guardId]').value=''">
        + Onboard Personnel
    </button>
</div>
<div id="guardsList" class="personnel-grid"
     hx-get="/api/guards-partial/"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>

<div id="guardForm" style="display:none" class="card">
    <h3 id="guardFormTitle">Add Guard</h3>
    <form hx-post="/api/profiles/"
          hx-target="#guardsList"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful){this.reset();document.getElementById('guardForm').style.display='none'}">
        <input type="hidden" name="guardId" value="">
        <div id="guardFormFields">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div><label>First Name</label><input type="text" name="first_name" required></div>
                <div><label>Last Name</label><input type="text" name="last_name"></div>
            </div>
            <input type="text" name="callsign" placeholder="Operator ID (e.g. TCN-01)">
            <select name="shift"><option>Day</option><option>Night</option><option>Flex</option></select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button type="submit" style="flex: 1;">Save</button>
            <button type="button" style="flex: 1;" class="btn-secondary" onclick="document.getElementById('guardForm').style.display='none'">Cancel</button>
        </div>
    </form>
</div>

{% block page_js %}
  {% load static %}
  {% load vite %}
  <script type="module" src="{% vite_asset 'src/pages/guards.js' %}"></script>
{% endblock %}
{% endblock %}
