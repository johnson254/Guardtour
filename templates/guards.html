{% extends base_template %}
{% block content %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/page-routes.css' %}" />
<style>
    .personnel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 4px; }
    .person-card { background: var(--r-surf2); border: 1px solid var(--r-line); border-radius: var(--r-rad); padding: 18px; transition: border-color .18s, transform .18s, box-shadow .18s; position: relative; overflow: hidden; }
    .person-card:hover { border-color: var(--r-line2); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    .person-card .status-pill { position: absolute; top: 14px; right: 14px; padding: 4px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
</style>
<div style="display:flex;align-items:center;justify-content:space-between;padding:0 0 16px 0;">
    <h3 style="font-size:0.85rem;font-weight:700;color:var(--r-text);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:10px;">
        <i class="fas fa-user-shield" style="color:var(--r-crim)"></i> Personnel Directory
    </h3>
    <button type="button" class="rs-btn rs-btn-primary"
            hx-get="/api/guard-form-partial/new/"
            hx-target="#guardFormFields"
            hx-swap="innerHTML"
            onclick="showGuardForm()">
        <i class="fas fa-plus"></i> Onboard Personnel
    </button>
</div>
<div id="guardsList" class="personnel-grid"
     hx-get="/api/guards-partial/"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>

<!-- Guard Form Overlay -->
<div id="guardForm" class="rs-overlay rs-hidden" style="pointer-events:auto;">
    <div class="rs-wiz">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;">
            <div class="rs-wiz-header">
                <div class="rs-wiz-title" id="guardFormTitle"><i class="fas fa-user-plus" style="color:var(--r-crim)"></i> Add Guard</div>
                <div class="rs-wiz-sub">Register a new field operator.</div>
            </div>
            <button type="button" class="rs-wiz-close" onclick="hideGuardForm()" title="Close"><i class="fas fa-xmark"></i></button>
        </div>
        <form hx-post="/api/profiles/"
              hx-target="#guardsList"
              hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful){this.reset();hideGuardForm()}">
            <input type="hidden" name="guardId" value="">
            <div id="guardFormFields" class="rs-block">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div><label class="rs-lbl">First Name</label><input class="rs-fi" type="text" name="first_name" required></div>
                    <div><label class="rs-lbl">Last Name</label><input class="rs-fi" type="text" name="last_name"></div>
                </div>
                <div style="margin-top:10px;"><label class="rs-lbl">Operator ID</label><input class="rs-fi" type="text" name="callsign" placeholder="e.g. TCN-01"></div>
                <div style="margin-top:10px;"><label class="rs-lbl">Shift</label>
                    <select class="rs-fi" name="shift">
                        <option>Day</option>
                        <option>Night</option>
                        <option>Flex</option>
                    </select>
                </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button type="submit" class="rs-btn rs-btn-primary" style="flex:1;"><i class="fas fa-check"></i> Save</button>
                <button type="button" class="rs-btn" style="flex:1;" onclick="hideGuardForm()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
function showGuardForm() {
    document.getElementById('guardForm').classList.remove('rs-hidden');
    document.getElementById('guardFormTitle').innerHTML = '<i class="fas fa-user-plus" style="color:var(--r-crim)"></i> Add Guard';
    document.querySelector('#guardForm input[name=guardId]').value = '';
}
function hideGuardForm() {
    document.getElementById('guardForm').classList.add('rs-hidden');
}
</script>

{% block page_js %}
  {% load static %}
  {% load vite %}
  <script type="module" src="{% vite_asset 'src/pages/guards.js' %}"></script>
{% endblock %}
{% endblock %}
