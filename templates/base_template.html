<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Command | SecOps</title>
    {% block extra_head %}{% endblock %}
    {% load static %}
    {% load vite %}
    <link rel="stylesheet" href="{% vite_asset 'src/main.js' 'css' %}">
    {% if debug %}
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% endif %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-bar"></div>
    </div>
    <div id="toast-container"></div>

    <header class="top-nav">
        <div class="nav-inner">
            <a href="/dashboard/" class="logo">Guard Command</a>
            <nav class="nav-links" id="nav-links"></nav>
            <div class="nav-right">
                <span class="org-name" id="org-name">SecOps</span>
                <span class="role-badge" id="role-badge"></span>
                <button type="button" class="logout-btn" id="logout-btn" title="Logout">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </div>
    </header>

    <main id="content" class="content">
        {% block content %}{% endblock %}
    </main>

    {% block page_js %}{% endblock %}
    <script>
        (function() {
            try {
                var userData = JSON.parse(localStorage.getItem('gt_user') || '{}');
                var roleEl = document.getElementById('role-badge');
                var orgEl = document.getElementById('org-name');
                var logoutBtn = document.getElementById('logout-btn');
                if (userData.role && roleEl) {
                    roleEl.textContent = userData.role;
                }
                if (userData.organization_name && orgEl) {
                    orgEl.textContent = userData.organization_name;
                }
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', function() {
                        try {
                            localStorage.removeItem('gt_user');
                        } catch (e) {}
                        window.location.href = '/';
                    });
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
