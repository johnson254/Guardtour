{% comment %} Wizard Step: Quick Deploy {% endcomment %}
<div class="rs-wiz" id="wizStepQuick">
    <button type="button" class="rs-btn-back" onclick="wizBack(1)"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="rs-wiz-header">
        <div class="rs-wiz-title"><i class="fas fa-bolt" style="color:#FFD54F"></i> Quick Deploy</div>
        <div class="rs-wiz-sub">Name it, assign guards, add points, deploy.</div>
    </div>

    <div class="rs-block" style="background:linear-gradient(135deg, rgba(211,47,47,0.05), rgba(20,20,32,0.96) 50%);">
        <div class="rs-form-section-title" style="margin-bottom:12px;">
            <span><i class="fas fa-bolt" style="color:#FFD54F;margin-right:6px;"></i> Mission Parameters</span>
            <small><i class="fas fa-circle" style="color:var(--r-amber);font-size:0.45rem;"></i> quick setup</small>
        </div>

        <div class="rs-g2">
            <div style="grid-column: span 2;" class="form-group">
                <label class="rs-lbl" for="qName">Blueprint Name *</label>
                <input id="qName" class="rs-fi rs-fi-sm" placeholder="e.g. Rapid Sweep A">
            </div>
            <div style="grid-column:span 2;">
                <label class="rs-lbl" for="qGuardInput">Assigned Personnel</label>
                <div style="position:relative;">
                    <div class="rs-tag-wrap" onclick="this.querySelector('input').focus()">
                        <div id="qGuardTags" style="display:contents"></div>
                        <input id="qGuardInput" class="rs-tag-input" placeholder="Type callsign + Enter…">
                    </div>
                    <div id="qGuardSuggest" class="rs-suggest-list rs-hidden"></div>
                </div>
            </div>
            <div style="grid-column:span 2;">
                <label class="rs-lbl" for="qShiftAny">Duty Cycle</label>
                <div class="rs-shift-pill" style="width: 100%;">
                    <input type="radio" name="qShift" value="Day" id="qShiftDay" class="rs-shift-radio" onchange="qHandleShift()">
                    <label for="qShiftDay" class="rs-shift-btn rs-shift-btn-day" style="flex:1; justify-content: center;"><i class="fas fa-sun"></i> Day Shift</label>
                    <input type="radio" name="qShift" value="" id="qShiftAny" checked class="rs-shift-radio" onchange="qHandleShift()">
                    <label for="qShiftAny" class="rs-shift-btn rs-shift-btn-any" style="flex:1; justify-content: center;"><i class="fas fa-infinity"></i> Flexible</label>
                    <input type="radio" name="qShift" value="Night" id="qShiftNight" class="rs-shift-radio" onchange="qHandleShift()">
                    <label for="qShiftNight" class="rs-shift-btn rs-shift-btn-night" style="flex:1; justify-content: center;"><i class="fas fa-moon"></i> Night Shift</label>
                </div>
            </div>
            <div>
                <label class="rs-lbl" for="qTime">Start Time</label>
                <input id="qTime" type="time" class="rs-fi rs-fi-sm" style="width:100%;">
            </div>
            <div>
                <label class="rs-lbl" for="qLead">Alert Lead (min)</label>
                <div style="display:flex;gap:6px;align-items:center;">
                    <input id="qLead" type="number" min="0" value="15" class="rs-fi rs-fi-sm" style="flex:1;">
                    <div class="rs-toggle-wrap" for="qAlert">
                        <label class="db-toggle"><input type="checkbox" id="qAlert" checked><span class="db-toggle-sl"></span></label>
                        <span class="rs-toggle-label">Alert</span>
                    </div>
                </div>
            </div>
            <div style="grid-column:span 2;">
                <label class="rs-lbl" for="qAnnouncementText">TTS Announcement</label>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input id="qAnnouncementText" class="rs-fi rs-fi-sm" placeholder="Radio instructions…" style="flex:1;">
                    <div class="rs-toggle-wrap">
                        <label class="db-toggle"><input type="checkbox" id="qAnnounceToggle" checked><span class="db-toggle-sl"></span></label>
                        <span class="rs-toggle-label">Broadcast</span>
                    </div>
                </div>
            </div>
            <div style="grid-column:span 2;">
                <div style="font-size:0.68rem; color:var(--r-teal); font-weight:800; padding:4px 0;"><i class="fas fa-calendar-check"></i> Active for today only</div>
            </div>
        </div>
    </div>

    <div class="rs-block" style="background:linear-gradient(135deg, rgba(0,196,154,0.045), rgba(20,20,32,0.96) 45%, rgba(211,47,47,0.035));">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <span class="rs-lbl" style="margin-bottom:0;">Mission Sequence</span>
            <div style="display:flex;gap:5px;">
                <button type="button" class="rs-btn rs-btn-xs" onclick="qAddPoint('nfc')"><i class="fas fa-wifi" style="color:var(--r-crim)"></i> NFC</button>
                <button type="button" class="rs-btn rs-btn-xs" onclick="qAddPoint('gps')"><i class="fas fa-map-pin" style="color:var(--r-indigo)"></i> GPS</button>
                <button type="button" class="rs-btn rs-btn-xs" onclick="qAddPoint('peer')"><i class="fas fa-user-shield" style="color:var(--r-violet)"></i> Peer</button>
                <button type="button" class="rs-btn rs-btn-xs" onclick="qAddPoint('custom')"><i class="fas fa-pen" style="color:var(--r-teal)"></i> Custom</button>
            </div>
        </div>
        <div id="qPointsList" class="rs-cp-list" style="max-height:160px;min-height:60px;border:1.5px dashed var(--r-line);border-radius:10px;padding:6px;">
            <div id="qPointsEmpty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 0;color:rgba(255,255,255,0.1);font-size:0.7rem;font-weight:700;">
                <i class="fas fa-layer-group" style="font-size:1.2rem;margin-bottom:5px;"></i>Empty — add points above
            </div>
        </div>
    </div>

    <div style="display:flex;gap:8px;">
        <button type="button" class="rs-btn rs-btn-block" style="flex:1;" onclick="qApply()"><i class="fas fa-wand-magic-sparkles"></i> Apply to Editor</button>
        <button type="button" class="rs-btn rs-btn-success rs-btn-block" style="flex:1;" onclick="qSaveDeploy()"><i class="fas fa-rocket"></i> Deploy Now</button>
    </div>

    <!-- Inline confirmation strip -->
    <div id="qdConfirmStrip" style="display:none;margin-top:12px;padding:12px 14px;border-radius:10px;background:rgba(0,196,154,0.06);border:1px solid rgba(0,196,154,0.18);animation:qdSlideIn .25s ease;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:8px;background:rgba(0,196,154,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fas fa-shield-check" style="color:var(--r-teal);font-size:0.8rem;"></i>
            </div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:0.72rem;font-weight:900;color:var(--r-teal);letter-spacing:0.3px;">CONFIRM DEPLOYMENT</div>
                <div id="qdConfirmSummary" style="font-size:0.55rem;color:rgba(255,255,255,0.45);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
            </div>
            <button type="button" style="background:none;border:none;color:var(--r-mute);cursor:pointer;padding:2px 6px;font-size:0.75rem;" onclick="qdDismissConfirm()" title="Cancel"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="qdConfirmCps" style="display:flex;flex-direction:column;gap:2px;max-height:120px;overflow-y:auto;margin-bottom:8px;"></div>
        <div style="display:flex;align-items:center;gap:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);">
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer;flex:1;" onclick="var c=document.getElementById('qdInlineVerify');if(c)c.checked=!c.checked;qdInlineUpdateBtn()">
                <input type="checkbox" id="qdInlineVerify" onchange="qdInlineUpdateBtn()" style="accent-color:#d32f2f;width:13px;height:13px;flex-shrink:0;" onclick="event.stopPropagation()">
                <span style="font-size:0.52rem;font-weight:600;color:rgba(255,255,255,0.55);">I verify all parameters are correct</span>
            </label>
            <button type="button" class="rs-btn rs-btn-success" id="qdInlineDeployBtn"
                style="padding:7px 16px;font-size:0.65rem;opacity:.4;cursor:not-allowed;letter-spacing:0.6px;white-space:nowrap;" disabled onclick="qdInlineExecute()">
                <i class="fas fa-rocket"></i> COMMENCE
            </button>
        </div>
    </div>
</div>
