<div class="mg-panel active" id="mgPanelStaff">
<div class="mg-panel-head">
    <h3 class="mg-panel-title"><i class="fas fa-users" style="color:var(--primary);margin-right:5px"></i>Staff &amp; Duty Board</h3>
    <div style="display:flex;gap:7px;">
        <button type="button" class="mg-btn mg-btn-sm" onclick="mgCalToday()"><i class="fas fa-crosshairs"></i> Today</button>
        <button type="button" class="mg-btn mg-btn-primary mg-btn-sm" onclick="mgOpenModal('guard')">
            <i class="fas fa-plus"></i> Add Officer
        </button>
        <button type="button" class="mg-btn mg-btn-primary mg-btn-sm" onclick="mgOpenModal('blueprint-shift')">
            <i class="fas fa-plus"></i> Assign
        </button>
    </div>
</div>
<div class="mg-panel-body" style="padding:0;">
    <div class="mg-duty-grid">
        <div style="padding:14px 16px; overflow-y:auto; border-right:1px solid var(--border);">
            <div class="mg-stats" id="personnelStats" hx-get="/api/staff-panel-stats-partial/" hx-trigger="load, every 30s" hx-swap="innerHTML"></div>
            <div class="mg-filter-bar" style="margin-bottom:12px;">
                <div class="mg-search-wrap">
                    <i class="fas fa-search"></i>
                    <input id="guardSearch" placeholder="Search personnel…" oninput="mgFilterGuards();mgSearchShowClear(this)">
                    <button type="button" class="mg-search-clear" id="guardSearchClear" onclick="mgClearSearch('guardSearch','guardSearchClear')"><i class="fas fa-xmark"></i></button>
                </div>
                <button type="button" class="mg-filter-chip active" onclick="mgGuardFilter('all',this)">All</button>
                <button type="button" class="mg-filter-chip" onclick="mgGuardFilter('guard',this)">Guards</button>
                <button type="button" class="mg-filter-chip" onclick="mgGuardFilter('supervisor',this)">Supvs</button>
                <button type="button" class="mg-filter-chip" onclick="mgGuardFilter('Day',this)"><i class="fas fa-sun"></i> Day</button>
                <button type="button" class="mg-filter-chip" onclick="mgGuardFilter('Night',this)"><i class="fas fa-moon"></i> Night</button>
            </div>
            <div class="mg-list" id="guardList">
                <div class="mg-empty"><i class="fas fa-user-slash"></i> Loading personnel…</div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column; overflow-y:auto;">
            <div style="padding:8px 14px; border-bottom:1px solid var(--border); flex-shrink:0;">
                <div class="mg-stats" id="callsignStats"></div>
            </div>
            <div style="border-bottom:1px solid rgba(255,255,255,0.04); flex-shrink:0;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 14px;">
                    <span class="mg-lbl" style="margin:0; display:flex; align-items:center; gap:6px;">
                        <i class="fas fa-link" style="color:var(--primary-light);font-size:0.55rem;"></i> Shift Pairs
                    </span>
                    <button type="button" class="mg-btn mg-btn-xs mg-btn-primary" onclick="mgTogglePairForm()" title="Bind two guards to one device as a shift pair" id="mgPairToggleBtn">
                        <i class="fas fa-plus"></i> Create Pair
                    </button>
                </div>
                <div id="mgPairForm" style="display:none;padding:0 14px 12px; border-top:1px solid rgba(255,255,255,0.04);">
                    <div style="padding:8px 0; display:flex; flex-direction:column; gap:8px;">
                        <div style="display:flex; gap:8px; align-items:center;">
                            <i class="fas fa-info-circle" style="color:var(--primary-light);font-size:0.5rem;flex-shrink:0;"></i>
                            <span style="font-size:0.58rem;color:rgba(255,255,255,0.4);">Bind two guards to one device as a shift pair</span>
                        </div>
                        <div>
                            <label class="mg-fi-label"><i class="fas fa-microchip"></i> Shared Device</label>
                            <select id="mSpDevice" class="mg-fi" style="font-size:0.6rem;padding:6px 10px;height:32px;">
                                <option value="">— Select device —</option>
                            </select>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:start;">
                            <div>
                                <label class="mg-fi-label" style="color:#FFD54F;font-size:0.5rem;">Primary</label>
                                <select id="mSpGuard1" class="mg-fi" style="font-size:0.6rem;padding:6px 10px;height:32px;">
                                    <option value="">— Guard —</option>
                                </select>
                                <select id="mSpShift1" class="mg-fi" style="font-size:0.55rem;padding:4px 8px;height:28px;margin-top:4px;">
                                    <option value="Day">Day</option>
                                    <option value="Night">Night</option>
                                    <option value="Flex">Flex</option>
                                </select>
                            </div>
                            <div style="display:flex;flex-direction:column;align-items:center;padding-top:16px;color:rgba(255,255,255,0.1);gap:2px;">
                                <i class="fas fa-link" style="font-size:0.7rem;"></i>
                                <span style="font-size:0.4rem;text-transform:uppercase;letter-spacing:0.4px;">Pair</span>
                            </div>
                            <div>
                                <label class="mg-fi-label" style="color:#7986cb;font-size:0.5rem;">Secondary</label>
                                <select id="mSpGuard2" class="mg-fi" style="font-size:0.6rem;padding:6px 10px;height:32px;">
                                    <option value="">— Guard —</option>
                                </select>
                                <select id="mSpShift2" class="mg-fi" style="font-size:0.55rem;padding:4px 8px;height:28px;margin-top:4px;">
                                    <option value="Night">Night</option>
                                    <option value="Day">Day</option>
                                    <option value="Flex">Flex</option>
                                </select>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                            <div><label class="mg-fi-label" style="font-size:0.5rem;">Start</label><input type="datetime-local" id="mSpStart" class="mg-fi" style="font-size:0.55rem;padding:4px 8px;height:28px;"></div>
                            <div><label class="mg-fi-label" style="font-size:0.5rem;">End</label><input type="datetime-local" id="mSpEnd" class="mg-fi" style="font-size:0.55rem;padding:4px 8px;height:28px;"></div>
                        </div>
                        <div style="display:flex; gap:6px; padding-top:4px;">
                            <button type="button" class="mg-btn mg-btn-xs mg-btn-primary" onclick="mgSubmitPairForm()" style="flex:1;"><i class="fas fa-check"></i> Create Pair</button>
                            <button type="button" class="mg-btn mg-btn-xs" onclick="mgTogglePairForm()" style="flex:1;">Cancel</button>
                        </div>
                    </div>
                </div>
                <div id="shiftPairsList" style="padding:0 14px 10px;">
                    <div class="mg-empty" style="padding:14px;font-size:0.58rem;"><i class="fas fa-plug"></i>No shift pairs configured</div>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.015); flex-shrink:0;">
                <span class="mg-lbl" style="margin:0; background:rgba(211,47,47,0.1); padding:3px 12px; border-radius:60px; border:1px solid rgba(211,47,47,0.2); font-size:0.5rem;" id="mgShiftListTitle">Deployments</span>
                <button type="button" class="mg-btn mg-btn-xs" onclick="mgRefreshBlueprintShift()">
                    <i class="fas fa-sync"></i> Sync
                </button>
            </div>
            <div class="mg-list" id="callsignList" style="padding: 8px 14px;">
                <div class="mg-empty"><i class="fas fa-satellite-dish"></i> Syncing shift data…</div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column; overflow:hidden; border-left:1px solid var(--border);">
            <div style="padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:rgba(255,255,255,0.015);">
                <span class="mg-lbl" style="margin:0; display:flex; align-items:center; gap:6px;">
                    <i class="fas fa-calendar-alt" style="color:var(--primary-light);font-size:0.55rem;"></i> Schedule
                </span>
            </div>
            <div style="flex:1; overflow:hidden;" id="mgCalComponentWrap">
                {% include "components/calendar_component.html" %}
            </div>
        </div>
    </div>
</div>
</div>
