{# manage/fleet_panel.html — Fleet & Asset Registry #}
<style>
.mg-fleet-grid {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 12px;
    min-height: calc(100vh - 270px);
}
@media (max-width: 1200px) {
    .mg-fleet-grid { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr auto; }
    .mg-cp-panel { grid-column: 1 / -1; }
}
@media (max-width: 800px) {
    .mg-fleet-grid { grid-template-columns: 1fr; }
}
.mg-fleet-devices {
    background: rgba(22,22,32,0.55);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
}
.mg-fleet-devices-head {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(108,142,239,0.08) 0%, rgba(22,22,32,0.85) 45%, transparent 100%);
}
.mg-fleet-devices-title {
    font-size: 0.68rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.mg-fleet-devices-title i {
    font-size: 0.75rem;
    color: var(--r-indigo);
    filter: drop-shadow(0 0 8px rgba(108,142,239,0.5));
}
.mg-fleet-devices-count {
    background: rgba(108,142,239,0.12);
    color: #7986cb;
    border: 1px solid rgba(108,142,239,0.22);
    font-size: 0.62rem;
    font-weight: 900;
    padding: 2px 8px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
}
.mg-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.mg-list::-webkit-scrollbar { width: 4px; }
.mg-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

/* Device card — brighter glass */
.mg-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all .22s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(4px);
}
.mg-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
}
.mg-card.staged {
    border-color: rgba(239,159,39,0.32);
    box-shadow: 0 0 18px rgba(239,159,39,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
}
.mg-card.staged::before {
    opacity: 1;
    background: linear-gradient(135deg, rgba(239,159,39,0.06), transparent 60%);
}
.mg-card-avatar {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    font-weight: 900;
    flex-shrink: 0;
    transition: transform .2s;
    position: relative;
}
.mg-card:hover .mg-card-avatar { transform: scale(1.06); }
.mg-card-live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5DCAA5;
    border: 2px solid #0D0D14;
    position: absolute;
    bottom: -2px;
    right: -2px;
    box-shadow: 0 0 12px rgba(93,202,165,0.4);
}
.mg-card-name { font-size: .76rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mg-card-sub { font-size: .62rem; color: rgba(255,255,255,.45); margin-top: 2px; }
.mg-card-actions { display: flex; gap: 4px; flex-shrink: 0; }

.mg-card-device { --card-accent: var(--r-indigo); }
.mg-card-device .mg-card-avatar { color: var(--r-indigo); background: rgba(108,142,239,.1); border: 1px solid rgba(108,142,239,.22); }
.mg-card-device.staged .mg-card-avatar { color: #EF9F27; background: rgba(245,166,35,.12); border-color: rgba(245,166,35,.28); }

.mg-cp-adders { overflow-y: auto; }
.mg-device-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.58rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 2px 7px;
    border-radius: 8px;
    white-space: nowrap;
}
.mg-device-status.status-online {
    background: rgba(93,202,165,.1);
    color: #5DCAA5;
    border: 1px solid rgba(93,202,165,.2);
}
.mg-device-status.status-offline {
    background: rgba(255,255,255,.03);
    color: rgba(255,255,255,.45);
    border: 1px solid rgba(255,255,255,.07);
}
.mg-filter-chip {
    font-size: 0.58rem;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all .15s;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
}
.mg-filter-chip:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
}
.mg-filter-chip.active {
    background: rgba(108,142,239,0.15);
    color: #6C8EEF;
    border-color: rgba(108,142,239,0.3);
}
.mg-filter-chip[data-status="online"].active { background: rgba(93,202,165,0.15); color: #5DCAA5; border-color: rgba(93,202,165,0.3); }
.mg-filter-chip[data-status="idle"].active { background: rgba(239,159,39,0.15); color: #EF9F27; border-color: rgba(239,159,39,0.3); }
.mg-filter-chip[data-status="nfc"].active { background: rgba(239,159,39,0.15); color: #EF9F27; border-color: rgba(239,159,39,0.3); }
.mg-filter-chip .chip-count { margin-left:4px; opacity:0.5; font-size:0.45rem; font-weight:900; }
.mg-device-status .staged-tag {
    background: rgba(245,166,35,.18);
    color: #F5A623;
    border: 1px solid rgba(245,166,35,.32);
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 900;
}

/* Inline device detail */
.mg-card-wrapper { position: relative; }
.mg-device-detail {
    position: fixed;
    z-index: 1000;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(160deg, rgba(28,28,40,0.98), rgba(18,18,28,0.99));
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    max-height: 60vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.mg-device-detail::-webkit-scrollbar { width: 5px; }
.mg-device-detail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
.mg-dd-inner { padding: 14px 16px; }
.mg-dd-section { border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.mg-dd-section:last-child { margin-bottom: 0; }
.mg-dd-section-title { font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.45); padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; transition: background .12s; }
.mg-dd-section-title:hover { background: rgba(255,255,255,0.03); }
.mg-dd-chev { margin-left: auto; font-size: 0.45rem; transition: transform .2s; }
.mg-dd-section.collapsed .mg-dd-chev { transform: rotate(-90deg); }
.mg-dd-section-body { padding: 0 12px 10px; }
.mg-dd-section.collapsed .mg-dd-section-body { display: none; }
.mg-dd-section-body > *:first-child { margin-top: 8px; }
.mg-dd-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.mg-dd-row:last-child { margin-bottom: 0; }
.mg-dd-label { font-size: 0.55rem; color: rgba(255,255,255,0.35); font-weight: 700; min-width: 60px; flex-shrink: 0; }
.mg-dd-input { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.25); color: #fff; font-size: 0.62rem; height: 28px; }
.mg-dd-input:focus { border-color: rgba(108,142,239,0.4); outline: none; }
.mg-dd-slider { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; }
.mg-dd-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #6C8EEF; cursor: pointer; }
.mg-dd-val { font-size: 0.55rem; color: rgba(255,255,255,0.5); min-width: 28px; text-align: right; font-weight: 700; }
.mg-dd-btn { padding: 5px 10px; border-radius: 6px; border: none; font-size: 0.58rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: all .15s; }
.mg-dd-btn-primary { background: #6C8EEF; color: #fff; }
.mg-dd-btn-primary:hover { filter: brightness(1.15); }
.mg-dd-btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
.mg-dd-btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
.mg-dd-btn-sm { padding: 4px 8px; font-size: 0.55rem; }
.mg-dd-btn-xs { padding: 2px 6px; font-size: 0.5rem; }
.mg-dd-textarea { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.25); color: #fff; font-size: 0.62rem; resize: vertical; min-height: 40px; margin-bottom: 4px; }
.mg-dd-textarea::placeholder { color: rgba(255,255,255,0.15); }
.mg-dd-status { font-size: 0.52rem; color: rgba(255,255,255,0.3); margin-top: 4px; }
.mg-dd-alert { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; background: rgba(239,159,39,0.08); border: 1px solid rgba(239,159,39,0.2); margin-bottom: 6px; }
.mg-dd-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.mg-dd-mini-label { font-size: 0.48rem; color: rgba(255,255,255,0.25); display: block; margin-bottom: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.mg-dd-footer { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); }
.mg-dd-footer .mg-dd-btn { padding: 7px 14px; font-size: 0.62rem; }
.mg-card-chev { font-size: 0.5rem; opacity: 0.15; transition: transform .2s, opacity .2s; margin-left: auto; flex-shrink: 0; display: flex; align-items: center; }
.mg-card:hover .mg-card-chev { opacity: 0.4; }
.mg-card-device.expanded .mg-card-chev { transform: rotate(180deg); opacity: 0.6; }


/* Checkpoint Groups */
.cb-group { margin-bottom:4px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); overflow:hidden; }
.cb-group-header { display:flex; align-items:center; gap:6px; padding:6px 8px; cursor:pointer; background:rgba(255,255,255,0.02); transition:background .12s; }
.cb-group-header:hover { background:rgba(255,255,255,0.04); }
.cb-group-icon { width:20px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:0.5rem; flex-shrink:0; }
.cb-group-title { font-size:0.55rem; font-weight:800; color:rgba(255,255,255,0.7); flex:1; }
.cb-group-count { font-size:0.5rem; font-weight:900; color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.05); padding:1px 6px; border-radius:8px; }
.cb-group-save { background:rgba(0,196,154,0.1); border:1px solid rgba(0,196,154,0.2); color:#00C49A; padding:2px 6px; border-radius:4px; font-size:0.45rem; cursor:pointer; opacity:0; transition:opacity .15s; }
.cb-group-header:hover .cb-group-save { opacity:1; }
.cb-group-save:hover { background:rgba(0,196,154,0.2); }
.cb-group-chev { font-size:0.4rem; color:rgba(255,255,255,0.2); transition:transform .2s; }
.cb-group.collapsed .cb-group-chev { transform:rotate(-90deg); }
.cb-group-body { padding:0 4px 4px; }
.cb-group.collapsed .cb-group-body { display:none; }
.cb-group-body:empty::after { content:"No points"; display:block; text-align:center; font-size:0.5rem; color:rgba(255,255,255,0.15); padding:8px; }

/* Center editor */
.mg-fleet-editor { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.mg-editor-scroll { flex:1; overflow-y:auto; padding:12px; }
.mg-editor-map-wrap { position:relative; margin-bottom:12px; }
.mg-editor-map-wrap #mgEditorMap { border-radius:10px; overflow:hidden; }
#mgEditorMap .leaflet-container { background:#0a0a12 !important; }
.edt-inp { width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.25);color:#fff;font-size:0.65rem;box-sizing:border-box; }
.edt-inp:focus { border-color:rgba(0,196,154,0.4);outline:none; }
.edt-param-box { border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px;margin-bottom:10px; }
.edt-param-title { font-size:0.55rem;font-weight:800;color:rgba(255,255,255,0.4);margin-bottom:8px;text-transform:uppercase; }
.edt-slider-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:4px; }
.edt-slider-lbl { font-size:0.55rem;font-weight:700; }
.edt-slider-val { font-size:0.6rem;font-weight:800;color:#fff; }
.edt-slider-i { width:100%;height:4px;margin-bottom:4px; }
.edt-preset-row { display:flex;gap:3px;margin-bottom:8px; }
.edt-preset { font-size:0.45rem;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);cursor:pointer;transition:all .1s; }
.edt-preset:hover { background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6); }
.edt-save-btn { width:100%;padding:10px;border-radius:8px;border:none;background:#00C49A;color:#fff;font-size:0.65rem;font-weight:700;cursor:pointer;margin-top:8px; }
.edt-save-btn:hover { filter:brightness(1.1); }


</style>

<div class="mg-fleet-grid">
    <!-- Stats bar -->
    <div class="mg-stats" id="deviceStats" style="grid-column: 1 / -1; margin: 0;" hx-get="/api/fleet-panel-stats-partial/" hx-trigger="load, every 30s" hx-swap="innerHTML"></div>
    <!-- LEFT: Devices -->
    <div class="mg-fleet-devices">
        <div class="mg-fleet-devices-head">
            <span class="mg-fleet-devices-title">
                <i class="fas fa-microchip" style="color:#6C8EEF;"></i> Fleet
            </span>
            <span id="deviceCountBadge" class="mg-fleet-devices-count">0</span>
        </div>
        <div class="mg-filter-bar" style="padding:8px 10px;">
            <div class="mg-search-wrap" style="flex:1;">
                <i class="fas fa-search"></i>
                <input id="deviceSearch" placeholder="Search name, callsign, IMEI…"
                       oninput="mgFilterDevicesDebounced()"
                       style="font-size:0.65rem;padding:5px 8px;">
            </div>
        </div>
        <div style="display:flex;gap:3px;padding:0 10px 8px;flex-wrap:wrap;">
             <button type="button" class="mg-filter-chip active" data-status="all" onclick="mgDeviceFilter('all',this)">All</button>
             <button type="button" class="mg-filter-chip" data-status="online" onclick="mgDeviceFilter('online',this)">Online</button>
             <button type="button" class="mg-filter-chip" data-status="idle" onclick="mgDeviceFilter('idle',this)">Idle</button>
             <button type="button" class="mg-filter-chip" data-status="mission" onclick="mgDeviceFilter('mission',this)">On Mission</button>
             <button type="button" class="mg-filter-chip" data-status="available" onclick="mgDeviceFilter('available',this)">Available</button>
             <button type="button" class="mg-filter-chip" data-status="nfc" onclick="mgDeviceFilter('nfc',this)">NFC Pending</button>
        </div>
        <div class="mg-list" id="deviceList" style="padding:0 8px;">
            <div class="mg-empty" style="padding:20px;"><i class="fas fa-circle-notch fa-spin" style="font-size:1rem;opacity:0.3;"></i></div>
        </div>
    </div>

    <!-- CENTER: Map / Editor -->
    <div class="mg-fleet-center">
        <!-- Map View -->
        <div class="mg-fleet-map" id="mgMapView">
            <div class="mg-map-head">
                <span class="mg-map-title">
                    <i class="fas fa-map" style="color:var(--cb-teal);"></i> Tactical Map
                </span>
                <div class="mg-map-legend">
                    <span class="mg-map-legend-item"><span class="mg-map-legend-dot" style="background:#5DCAA5;"></span>Online</span>
                    <span class="mg-map-legend-item"><span class="mg-map-legend-dot" style="background:#EF9F27;"></span>Idle</span>
                    <span class="mg-map-legend-item"><span class="mg-map-legend-dot" style="background:var(--r-crim);"></span>NFC</span>
                    <span class="mg-map-legend-item"><span class="mg-map-legend-dot" style="background:#6C8EEF;"></span>GPS</span>
                    <span class="mg-map-legend-item"><span class="mg-map-legend-dot" style="background:var(--cb-teal);"></span>Staged</span>
                </div>
                <div style="display:flex;gap:4px;align-items:center;margin-left:4px;">
                    <button type="button" id="cbBoundaryBtn" onclick="cbOpenZoneModal()" title="Set operational area boundary" style="background:rgba(0,196,154,0.1);border:1px solid rgba(0,196,154,0.2);color:#00C49A;padding:2px 6px;border-radius:4px;font-size:0.45rem;cursor:pointer;display:flex;align-items:center;gap:3px;"><i class="fas fa-draw-polygon"></i> Area</button>
                    <button type="button" onclick="cbZoomFit()" title="Fit to checkpoints" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:2px 6px;border-radius:4px;font-size:0.45rem;cursor:pointer;"><i class="fas fa-expand"></i></button>
                </div>
                <span id="mgMapCoord" style="font-size:0.45rem;color:rgba(255,255,255,0.2);font-family:monospace;">—</span>
            </div>
            <div id="mgFleetMap" class="mg-map-canvas"></div>
            <div id="cbMapHint" class="mg-map-hint"></div>
        </div>
        <!-- Editor View (checkpoint/device) -->
        <div class="mg-fleet-editor" id="mgEditorView" style="display:none;">
            <div class="mg-map-head">
                <span class="mg-map-title" id="mgEditorTitle">
                    <i class="fas fa-crosshairs" style="color:var(--cb-teal);"></i> <span id="mgEditorLabel">Edit Checkpoint</span>
                </span>
                <button type="button" onclick="mgCloseEditor()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:3px 8px;border-radius:4px;font-size:0.5rem;cursor:pointer;"><i class="fas fa-chevron-left"></i> Back</button>
            </div>
            <div class="mg-editor-scroll">
                <!-- Mini map for location picking -->
                <div class="mg-editor-map-wrap">
                    <div id="mgEditorMap" style="height:180px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:#0a0a12;position:relative;"></div>
                    <button type="button" onclick="mgEditorPickMode()" id="mgEditorPickBtn" style="position:absolute;bottom:8px;right:8px;background:rgba(0,196,154,0.2);border:1px solid rgba(0,196,154,0.4);color:#00C49A;padding:4px 10px;border-radius:6px;font-size:0.5rem;cursor:pointer;z-index:10;"><i class="fas fa-map-pin"></i> Pick on Map</button>
                </div>
                <!-- Editor content injected here -->
                <div id="mgEditorBody"></div>
            </div>
        </div>
    </div>

    <!-- RIGHT: Checkpoints -->
    <div class="mg-cp-panel">
        <div class="mg-cp-glass">
            <div class="mg-cp-panel-head">
                <span class="mg-cp-panel-title">
                    <i class="fas fa-crosshairs" style="color:var(--cb-teal);"></i> Checkpoint Builder
                </span>
                <span class="mg-cp-panel-count" id="regCountStaged">0</span>
            </div>
            <div class="mg-cp-trigger-wrap">
                <button type="button" class="mg-cp-trigger" onclick="mgToggleCpAdders()">
                    <i class="fas fa-plus"></i> Add Checkpoint
                    <i class="fas fa-chevron-down" id="mgCpTriggerIcon" style="margin-left:auto;font-size:0.5rem;transition:transform .3s;"></i>
                </button>
                <div class="mg-cp-adders" id="mgCpAdders">
                    <div class="mg-cp-adders-inner">
                        <button type="button" class="mg-cp-add-btn" data-type="nfc" onclick="cbQuickAdd('nfc')">
                            <span class="mg-cp-add-ico" style="background:rgba(211,47,47,0.12);color:#d32f2f;"><i class="fas fa-wifi"></i></span>
                            <span>NFC</span>
                        </button>
                        <button type="button" class="mg-cp-add-btn" data-type="gps" onclick="cbQuickAdd('gps')">
                            <span class="mg-cp-add-ico" style="background:rgba(108,142,239,0.12);color:#6C8EEF;"><i class="fas fa-map-pin"></i></span>
                            <span>GPS</span>
                        </button>
                        <button type="button" class="mg-cp-add-btn" data-type="peer" onclick="cbQuickAdd('peer')">
