<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guard Command | SecOps</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    {% load vite %}
    <link rel="stylesheet" href="{% vite_asset 'src/main.js' 'css' %}">
    <script type="module" src="{% vite_asset 'src/main.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <script type="module" src="{% static 'src/browser/shared-globals.js' %}"></script>
    {% block extra_head %}{% endblock %}
</head>
<body hx-history-restore="true">
    <div class="toast-container" id="toast-container"></div>
    {% block content %}{% endblock %}
    <script>
         let userData = {};
         try { userData = JSON.parse(localStorage.getItem('gt_user') || '{}'); } catch(e) {}
         const publicPaths = ['/', '/login/', '/register/'];
         if (!userData.token && !publicPaths.includes(window.location.pathname)) {
             window.location.href = '/';
         }
         const isSystemAdmin = userData.role === 'admin' && (userData.organization_id === null || userData.organization_id === undefined);

          if (typeof window.apiFetch === 'undefined') {
              window.apiFetch = async function apiFetch(url, options = {}) {
                  const defaultHeaders = {
                     'Authorization': 'Bearer ' + userData.token,
                     'Content-Type': 'application/json'
                 };
                 options.headers = { ...defaultHeaders, ...options.headers };
                  try {
                      const response = await fetch(url, options);
                      if (response.status === 401) { window.location.href = '/'; return; }
                     if (!response.ok && options.method && options.method !== 'GET') {
                         let errData = {};
                         try { const clone = response.clone(); errData = await clone.json(); } catch(e) { errData = {error: 'Server error'}; }
                     }
                     return response;
                  } catch (err) {
                      throw err;
                 }
             };
         }

    </script>
    {% block page_js %}{% endblock %}
</body>
</html>
